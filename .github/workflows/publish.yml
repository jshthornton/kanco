name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to bump to (e.g. 0.2.0). Leave empty to publish current version."
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile=false

      - name: Bump version
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        working-directory: apps/server
        run: |
          npm version "${{ inputs.version }}" --no-git-tag-version
          cd ../..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/server/package.json
          git commit -m "Release kanco v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push --follow-tags

      - name: Build
        run: pnpm build

      # Trusted Publisher (OIDC) auth requires npm >=11.5. Node 20's bundled
      # npm is 10.x — it signs provenance fine but doesn't do the registry
      # OIDC exchange and the PUT 404s. Upgrade npm before publishing.
      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      # Auth is via npm Trusted Publisher (OIDC): no NPM_TOKEN needed.
      # The package on npmjs.com must be configured with this repo + workflow
      # as a trusted publisher. Provenance is published alongside the tarball.
      # Uses `npm publish` directly: pnpm publish doesn't run the OIDC token
      # exchange that npm CLI does internally for trusted publishers.
      - name: Publish
        working-directory: apps/server
        run: npm publish --access public --provenance
