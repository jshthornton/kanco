services:
  kanco:
    build:
      context: .
      args:
        # Set this once when you build the image to bake in the kanco App client id.
        KANCO_GH_CLIENT_ID: ${KANCO_GH_CLIENT_ID:-}
    image: kanco:latest
    container_name: kanco
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      - ./kanco-data:/data
    environment:
      # Set to your "kanco" GitHub App client id (Iv23li... / Iv1....) for device-flow auth.
      KANCO_GH_CLIENT_ID: ${KANCO_GH_CLIENT_ID:-}
      # Optional: fixed encryption passphrase for the on-disk GitHub token.
      # If unset, a random per-install secret is generated at /data/.secret.
      KANCO_SECRET: ${KANCO_SECRET:-}
